<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Penngolf Caddy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #2ecc71; --bg: #121212; --card: #1e1e1e; --accent: #3498db; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: white; overflow: hidden; touch-action: manipulation; }
        #map { height: 35vh; width: 100%; background: #222; border-bottom: 2px solid var(--primary); }
        #ui-container { height: 65vh; padding: 12px; box-sizing: border-box; overflow-y: auto; padding-bottom: 100px; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; margin-bottom: 10px; }
        .big-number { font-size: 42px; font-weight: 900; color: var(--primary); line-height: 1; }
        .label { color: #888; font-size: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }

        /* Par & Score Controls */
        .btn-group { display: flex; gap: 8px; margin-top: 8px; }
        .par-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; font-weight: bold; cursor: pointer; }
        .par-btn.active { background: var(--accent); border-color: var(--accent); }
        
        .score-pill { background: #333; padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 14px; }
        .plus { color: #e74c3c; } .minus { color: var(--primary); } .even { color: #f1c40f; }

        /* Overlays */
        #shot-overlay { position: absolute; top: 15px; right: 60px; z-index: 1000; }
        #shot-btn { background: var(--primary); color: black; border: none; padding: 10px 18px; border-radius: 25px; font-weight: 900; }
        #locate-btn { position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; border: none; border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        
        /* Modal Scorecard */
        #scorecard-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 30px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; }
        
        .main-btn { background: var(--primary); color: black; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <button id="locate-btn" onclick="snapToUser()">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
    </button>

    <div id="shot-overlay"><button id="shot-btn" onclick="toggleShotTrack()">START SHOT</button></div>
    <div id="map"></div>

    <div id="ui-container">
        <!-- Live Totals -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div id="status-bar" class="label">GPS: Standby</div>
            <div id="live-total" class="score-pill even">TOT: E</div>
        </div>
        
        <!-- Distance Card -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; text-align: center;">
                <div style="flex: 1;"><div class="label">Actual</div><div id="dist-raw" class="big-number">--</div></div>
                <div style="flex: 1; border-left: 1px solid #333; border-right: 1px solid #333;"><div class="label">Plays Like</div><div id="dist-plays" class="big-number">--</div></div>
                <div style="flex: 1;"><div class="label">Slope</div><div id="slope-val" class="big-number" style="font-size: 24px; padding-top:12px;">0°</div></div>
            </div>
        </div>

        <!-- Scoring Card -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span class="label">Hole <span id="hole-num" style="color:white; font-size:18px;">1</span></span>
                <div>
                    <span class="label">Score</span> 
                    <input type="number" id="h-score" value="4" style="background:#333; border:none; color:white; padding:5px; border-radius:4px; width:40px; text-align:center;">
                </div>
            </div>
            <div class="label">Set Hole Par</div>
            <div class="btn-group">
                <button class="par-btn" onclick="setPar(3, this)">PAR 3</button>
                <button class="par-btn active" onclick="setPar(4, this)">PAR 4</button>
                <button class="par-btn" onclick="setPar(5, this)">PAR 5</button>
            </div>
            <button class="main-btn" onclick="saveAndNext()">FINISH HOLE & NEXT</button>
        </div>

        <button class="main-btn" style="background:#444; color:white;" onclick="toggleScorecard(true)">VIEW SCORECARD</button>
        <button class="main-btn" style="background:#3498db; color:white;" onclick="downloadData()">DOWNLOAD ROUND (.TXT)</button>
    </div>

    <!-- Scorecard Modal -->
    <div id="scorecard-modal">
        <span class="close-modal" onclick="toggleScorecard(false)">&times;</span>
        <h2>Round Scorecard</h2>
        <div id="total-summary" style="font-size: 20px; font-weight: bold; margin-bottom: 10px;"></div>
        <table id="card-table">
            <thead><tr><th>Hole</th><th>Par</th><th>Score</th><th>+/-</th></tr></thead>
            <tbody id="card-body"></tbody>
        </table>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, maxZoom: 22 }).setView([0,0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 22, maxNativeZoom: 18 }).addTo(map);

        let userMarker, targetMarker, targetLine, userPos = null, targetPos = null;
        let shotStartPos = null, isTrackingShot = false, currentPar = 4;
        let roundData = { scores: [], totalPar: 0, totalScore: 0 };
        let dataLayer = L.layerGroup().addTo(map);

        navigator.geolocation.watchPosition((pos) => {
            userPos = [pos.coords.latitude, pos.coords.longitude];
            document.getElementById('status-bar').innerText = "GPS: " + Math.round(pos.coords.accuracy) + "m";
            if (!userMarker) {
                userMarker = L.circleMarker(userPos, {radius: 8, color: 'white', fillColor: '#3498db', fillOpacity: 1, weight: 3}).addTo(map);
                map.setView(userPos, 19);
            } else userMarker.setLatLng(userPos);
            updateCalculations();
        }, null, { enableHighAccuracy: true });

        map.on('click', (e) => {
            targetPos = [e.latlng.lat, e.latlng.lng];
            if (!targetMarker) targetMarker = L.circleMarker(targetPos, {radius: 6, color: '#2ecc71', fillColor: 'black', fillOpacity: 0.6}).addTo(map);
            else targetMarker.setLatLng(targetPos);
            updateCalculations();
        });

        async function updateCalculations() {
            if (!userPos || !targetPos) return;
            if (targetLine) map.removeLayer(targetLine);
            targetLine = L.polyline([userPos, targetPos], {color: '#2ecc71', weight: 2, dashArray: '5, 10'}).addTo(map);
            const mtrs = map.distance(userPos, targetPos);
            const yds = Math.round(mtrs * 1.09361);
            document.getElementById('dist-raw').innerText = yds;
            try {
                const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${userPos[0]},${userPos[1]}|${targetPos[0]},${targetPos[1]}`);
                const data = await res.json();
                const elevDiff = data.results[1].elevation - data.results[0].elevation;
                document.getElementById('slope-val').innerText = (Math.atan(elevDiff / mtrs) * (180 / Math.PI)).toFixed(1) + "°";
                document.getElementById('dist-plays').innerText = Math.round((mtrs + (elevDiff * 1.1)) * 1.09361);
            } catch (e) { document.getElementById('dist-plays').innerText = yds; }
        }

        function setPar(p, btn) {
            currentPar = p;
            document.querySelectorAll('.par-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('h-score').value = p; // Suggest par as score
        }

        function saveAndNext() {
            const hole = parseInt(document.getElementById('hole-num').innerText);
            const score = parseInt(document.getElementById('h-score').value);
            const diff = score - currentPar;
            
            roundData.scores.push({ hole, par: currentPar, score, diff });
            roundData.totalPar += currentPar;
            roundData.totalScore += score;
            
            updateLiveTotal();
            document.getElementById('hole-num').innerText = hole + 1;
            document.getElementById('h-score').value = 4; // reset default
        }

        function updateLiveTotal() {
            const diff = roundData.totalScore - roundData.totalPar;
            const el = document.getElementById('live-total');
            if (diff === 0) { el.innerText = "TOT: E"; el.className = "score-pill even"; }
            else if (diff > 0) { el.innerText = "TOT: +" + diff; el.className = "score-pill plus"; }
            else { el.innerText = "TOT: " + diff; el.className = "score-pill minus"; }
        }

        function toggleScorecard(show) {
            const modal = document.getElementById('scorecard-modal');
            if (show) {
                const body = document.getElementById('card-body');
                body.innerHTML = "";
                roundData.scores.forEach(s => {
                    const row = `<tr><td>${s.hole}</td><td>${s.par}</td><td>${s.score}</td><td>${s.diff > 0 ? '+'+s.diff : (s.diff === 0 ? 'E' : s.diff)}</td></tr>`;
                    body.innerHTML += row;
                });
                const totalDiff = roundData.totalScore - roundData.totalPar;
                document.getElementById('total-summary').innerText = `Total Score: ${roundData.totalScore} (${totalDiff > 0 ? '+'+totalDiff : (totalDiff === 0 ? 'E' : totalDiff)})`;
                modal.style.display = "block";
            } else { modal.style.display = "none"; }
        }

        function downloadData() {
            let txt = "PENNGOLF SCORECARD\n==================\n";
            roundData.scores.forEach(s => {
                txt += `Hole ${s.hole} | Par ${s.par} | Score ${s.score} | (+/- ${s.diff})\n`;
            });
            txt += `\nFINAL TOTAL: ${roundData.totalScore} (${roundData.totalScore - roundData.totalPar})`;
            const blob = new Blob([txt], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'round.txt'; a.click();
        }

        function toggleShotTrack() {
            const btn = document.getElementById('shot-btn');
            if (!isTrackingShot) { shotStartPos = [...userPos]; isTrackingShot = true; btn.innerText = "STOP"; }
            else { isTrackingShot = false; btn.innerText = "START SHOT"; }
        }
        function snapToUser() { if (userPos) map.setView(userPos, 19); }
    </script>
</body>
</html>
