<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Penngolf Pro Caddy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc71; --bg: #0b0b0b; --card: #1a1a1a; --accent: #3498db; --danger: #e74c3c; --gold: #f1c40f;}
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin:0; font-family:-apple-system,sans-serif; background:var(--bg); color:white; overflow:hidden; }
        #map-container { position:relative; height:38vh; border-bottom:2px solid var(--primary); background:#222; }
        #map { height:100%; width:100%; }
        .map-overlay-right, .map-overlay-left { position:absolute; bottom:12px; z-index:1000; display:flex; flex-direction:column; gap:8px; }
        .map-overlay-right { right:12px; }
        .map-overlay-left { left:12px; }
        .map-sub-btn { background:rgba(255,255,255,0.95); border:none; border-radius:10px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.4); }

        .record-btn {
            background: #e74c3c; color: white; border: none; padding: 10px 14px; border-radius: 30px;
            font-weight: 900; font-size: 11px; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.6);
        }
        .record-btn::before { content: ''; display: inline-block; width: 10px; height: 10px; background: white; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .util-btn { background:#2a2a2a; padding:10px 12px; border-radius:12px; color:var(--primary); font-size: 11px; border: 1px solid #333; }
        #shot-btn, .main-btn { background:var(--primary); color:black; border:none; padding:14px; border-radius:14px; font-weight:900; text-transform:uppercase; }
        .card { background: var(--card); border-radius: 16px; padding: 18px; border: 1px solid #2a2a2a; margin-bottom: 12px; }
        .big-number { font-size: 42px; font-weight: 900; color: var(--primary); line-height: 1; letter-spacing: -2px; }
        .label { color: #777; font-size: 10px; text-transform: uppercase; font-weight: 800; margin-bottom: 6px; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .par-btn { flex: 1; padding: 15px 5px; border-radius: 10px; border: 1px solid #333; background: #222; color: white; font-weight: 800; font-size: 11px; }
        .par-btn.active { background: var(--accent); border-color: var(--accent); }
        .adjust-btn { width: 55px; height: 55px; border-radius: 18px; border: none; background: #333; color: white; font-size: 28px; }
        .pixel-logo { font-family:'Press Start 2P',cursive; font-size:9px; color:var(--primary); }
        .logo-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:8px; flex-wrap:wrap; }
        #tracer-modal, .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:3000; }
        #tracer-video-container { position:relative; width:100%; height:58vh; background:#111; }
        #tracer-video, #tracer-canvas { width:100%; height:100%; object-fit:cover; }
        #tracer-canvas { position:absolute; top:0; left:0; pointer-events:auto; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th { background:#111; padding:10px; font-size:10px; }
        td { padding:12px 8px; text-align:center; border-bottom:1px solid #333; font-size:16px; }
        tr { cursor:pointer; }
        tr:hover { background:rgba(46,204,113,0.15); }
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 3px solid var(--primary); padding: 20px; border-radius: 15px; z-index: 5000; font-family: 'Press Start 2P', cursive; text-align: center; color: var(--primary); display: none; font-size:14px; }
    </style>
</head>
<body>

    <div id="toast">PAR</div>
    
    <div id="map-container">
        <div id="map"></div>
        <div class="map-overlay-left">
            <div id="live-shot-counter">0 YDS</div>
            <button id="shot-btn" onclick="toggleShotTrack()">START SHOT</button>
            <div id="accuracy-info" style="font-size:9px;color:#888;"></div>
        </div>
        <div class="map-overlay-right">
            <button id="clear-target-btn" class="map-sub-btn" style="display:none;" onclick="clearTarget()">✕</button>
            <button class="map-sub-btn" onclick="resetNorth()">⟳</button>
            <button class="map-sub-btn" onclick="snapToUser()">📍</button>
        </div>
    </div>

    <div id="ui-container" style="height:62vh;padding:15px;overflow-y:auto;padding-bottom:140px;">
        <div class="logo-bar">
            <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
                <button id="unit-toggle" class="util-btn" onclick="cycleUnits()">YDS</button>
                <button class="record-btn" onclick="toggleTracer(true)">SHOT TRACER</button>
            </div>
            <div class="pixel-logo">PENNGOLF PRO</div>
            <div id="live-total" class="util-btn" style="color:var(--gold)">TOT: E</div>
        </div>

        <!-- Distance Card (kept) -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; text-align: center;">
                <div style="flex:1;"><div class="label">Actual</div><div id="dist-raw" class="big-number">--</div></div>
                <div style="flex:1;border-left:1px solid #333;border-right:1px solid #333;"><div class="label">Plays Like</div><div id="dist-plays" class="big-number">--</div></div>
                <div style="flex:1;"><div class="label">Slope</div><div id="slope-val" class="big-number" style="font-size:22px;">0°</div></div>
            </div>
        </div>

        <!-- Hole Scoring Card -->
        <div class="card">
            <div style="margin-bottom:12px;display:flex;justify-content:space-between;">
                <span class="label">Hole <span id="hole-num">1</span></span>
                <span id="edit-indicator" class="label" style="color:var(--accent);display:none;">● EDITING</span>
            </div>
            <div class="btn-row">
                <button class="par-btn" onclick="setPar(3,this)">PAR 3</button>
                <button class="par-btn active" onclick="setPar(4,this)">PAR 4</button>
                <button class="par-btn" onclick="setPar(5,this)">PAR 5</button>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
                <span class="label">Total Shots</span>
                <div style="display:flex;gap:25px;">
                    <button class="adjust-btn" onclick="adjustScore(-1)">−</button>
                    <div id="h-score-display" style="font-size:36px;font-weight:900;width:40px;text-align:center;">4</div>
                    <button class="adjust-btn" onclick="adjustScore(1)">+</button>
                </div>
            </div>
            <button id="finish-btn" class="main-btn" onclick="saveAndNext()">FINISH HOLE</button>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <button class="main-btn" style="background:#333;" onclick="toggleScorecard(true)">SCORECARD</button>
            <button class="main-btn" style="background:var(--accent);" onclick="downloadData()">EXPORT</button>
        </div>
    </div>

    <!-- SCORE CARD MODAL -->
    <div id="scorecard-modal" class="modal">
        <span style="float:right;font-size:40px;color:#555;cursor:pointer;" onclick="toggleScorecard(false)">×</span>
        <h2 style="color:var(--primary);font-family:'Press Start 2P';font-size:11px;margin-top:30px;">SCORECARD</h2>
        <div id="total-summary" style="font-size:22px;margin:20px 0;font-weight:900;color:var(--gold);"></div>
        <table>
            <thead><tr><th>Hole
