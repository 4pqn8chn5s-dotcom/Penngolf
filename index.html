<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MPENN GOLF Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc71; --bg: #0b0b0b; --card: #1a1a1a; --accent: #3498db; --danger: #e74c3c; }
        
        /* Mobile Optimization: Prevent scrolling/bouncing */
        html, body { 
            position: fixed; overflow: hidden; width: 100%; height: 100%; 
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: -apple-system, system-ui, sans-serif;
        }

        #map { height: 40vh; width: 100%; touch-action: none; border-bottom: 2px solid var(--primary); }
        
        #ui-container { 
            height: 60vh; overflow-y: scroll; -webkit-overflow-scrolling: touch;
            padding: 12px 12px 140px 12px; box-sizing: border-box; 
        }

        /* 8-BIT LOGO BAR */
        .logo-bar { display: flex; justify-content: space-between; align-items: center; padding: 5px 0 15px 0; }
        .pixel-logo { font-family: 'Press Start 2P', cursive; font-size: 10px; color: var(--primary); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); color: #fff; } }

        /* GPS BANNER - More aggressive for mobile */
        #gps-error { 
            position: fixed; top: 0; left: 0; right: 0; background: var(--danger); 
            z-index: 9999; padding: 20px; text-align: center; display: flex; 
            flex-direction: column; gap: 10px; font-weight: bold;
        }
        .perm-btn { background: white; color: var(--danger); border: none; padding: 12px 24px; border-radius: 50px; font-weight: 800; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        .card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #2a2a2a; }
        .big-number { font-size: 44px; font-weight: 900; color: var(--primary); letter-spacing: -2px; }
        .label { color: #777; font-size: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        .score-row { display: flex; align-items: center; justify-content: space-between; }
        .adjust-btn { width: 55px; height: 55px; border-radius: 50%; border: none; background: #333; color: white; font-size: 28px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .par-btn { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #222; color: white; font-weight: bold; position: relative; }
        .par-btn.active { background: var(--accent); border-color: var(--accent); }
        .par-btn::after { content: "PAR"; position: absolute; top: 4px; left: 50%; transform: translateX(-50%); font-size: 7px; opacity: 0.4; }

        .main-btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: 800; font-size: 16px; margin-top: 10px; }
        
        #shot-overlay { position: absolute; top: 10px; right: 10px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        #live-shot-counter { background: rgba(0,0,0,0.9); padding: 6px 12px; border-radius: 10px; border: 1px solid var(--primary); font-family: 'Press Start 2P'; font-size: 8px; color: var(--primary); display: none; }
        #shot-btn { background: var(--primary); color: black; border: none; padding: 10px 16px; border-radius: 20px; font-weight: 900; font-size: 12px; }
        
        #map-actions { position: absolute; bottom: 62vh; right: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        .map-sub-btn { background: rgba(255,255,255,0.9); border: none; border-radius: 10px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="gps-error">
        <span>GPS CONNECTION LOST</span>
        <button class="perm-btn" onclick="initiateGPS()">RECONNECT SATELLITE</button>
        <small style="font-size: 9px; opacity: 0.8;">Ensure Safari > Location is "Allow"</small>
    </div>

    <div id="map"></div>

    <div id="shot-overlay">
        <button id="shot-btn" onclick="toggleShotTrack()">START SHOT</button>
        <div id="live-shot-counter">0 YDS</div>
    </div>

    <div id="map-actions">
        <button class="map-sub-btn" onclick="snapToUser()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="black"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06z"/></svg>
        </button>
        <button id="clear-target-btn" class="map-sub-btn" style="display:none; color:var(--danger);" onclick="clearTarget()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
    </div>

    <div id="ui-container">
        <div class="logo-bar">
            <div id="unit-toggle" class="label" style="background:#222; padding:8px 15px; border-radius:20px; color:var(--primary);" onclick="cycleUnits()">YDS</div>
            <div class="pixel-logo">MPENN GOLF</div>
            <div id="live-total" style="background:#222; padding:8px 15px; border-radius:20px; font-weight:800; font-size:12px;">TOT: E</div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; text-align: center;">
                <div style="flex: 1;"><div class="label">Actual</div><div id="dist-raw" class="big-number">--</div></div>
                <div style="flex: 1; border-left: 1px solid #2a2a2a; border-right: 1px solid #2a2a2a;"><div class="label">Plays Like</div><div id="dist-plays" class="big-number">--</div></div>
                <div style="flex: 1;"><div class="label">Slope</div><div id="slope-val" class="big-number" style="font-size: 24px; padding-top:12px;">0°</div></div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span class="label" style="font-size:14px; color:white;">Hole <span id="hole-num">1</span></span>
                <span class="label" style="color:var(--accent);">Select Par</span>
            </div>
            <div class="btn-group" style="margin-bottom: 25px;">
                <button class="par-btn" onclick="setPar(3, this)">3</button>
                <button class="par-btn active" onclick="setPar(4, this)">4</button>
                <button class="par-btn" onclick="setPar(5, this)">5</button>
            </div>
            <div class="score-row">
                <span class="label" style="font-size:12px; color:white;">Hole Score</span>
                <div style="display:flex; align-items:center; gap:25px;">
                    <button class="adjust-btn" onclick="adjustScore(-1)">−</button>
                    <div id="h-score-display" style="font-size:36px; font-weight:900;">4</div>
                    <button class="adjust-btn" onclick="adjustScore(1)">+</button>
                </div>
            </div>
            <button class="main-btn" onclick="saveAndNext()">FINISH HOLE</button>
        </div>

        <button class="main-btn" style="background:#222; color:white; border:1px solid #444;" onclick="toggleScorecard(true)">VIEW SCORECARD</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, maxZoom: 22, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 22, maxNativeZoom: 18 }).addTo(map);

        let userPos, targetPos, userMarker, targetMarker, targetLine, shotStartPos;
        let isTrackingShot = false, currentPar = 4, currentScore = 4, currentUnit = 'YDS';
        let roundData = { scores: [], totalPar: 0, totalScore: 0 };
        let lastLoggedPos = null;

        function haptic() { if(window.navigator.vibrate) window.navigator.vibrate(20); }

        // IMPROVED GPS HANDSHAKE
        function initiateGPS() {
            haptic();
            const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };
            
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    document.getElementById('gps-error').style.display = 'none';
                    updateUserPos(pos);
                    // Start a regular interval to "pull" the location, which Safari likes better than "push"
                    setInterval(() => {
                        navigator.geolocation.getCurrentPosition(updateUserPos, null, options);
                    }, 3000);
                },
                (err) => {
                    alert("GPS Error: " + err.message + "\n\nGo to Settings > Privacy > Location Services > Safari and ensure 'While Using' is checked.");
                },
                options
            );
        }

        function updateUserPos(pos) {
            userPos = [pos.coords.latitude, pos.coords.longitude];
            if (!userMarker) {
                userMarker = L.circleMarker(userPos, {radius: 10, color: 'white', fillColor: '#3498db', fillOpacity: 1, weight: 3}).addTo(map);
                map.setView(userPos, 19);
            } else {
                userMarker.setLatLng(userPos);
            }

            if (isTrackingShot && shotStartPos) {
                const liveDist = convert(map.distance(shotStartPos, userPos));
                document.getElementById('live-shot-counter').innerText = `${liveDist} ${currentUnit}`;
            }

            if (!lastLoggedPos || map.distance(lastLoggedPos, userPos) > 3) {
                updateCalculations();
                lastLoggedPos = [...userPos];
            }
        }

        // Auto-run attempt
        initiateGPS();

        function cycleUnits() { haptic(); currentUnit = (currentUnit === 'YDS') ? 'MTR' : 'YDS'; document.getElementById('unit-toggle').innerText = currentUnit; updateCalculations(true); }
        function convert(m) { return currentUnit === 'YDS' ? Math.round(m * 1.09361) : Math.round(m); }
        function adjustScore(v) { haptic(); currentScore = Math.max(1, currentScore + v); document.getElementById('h-score-display').innerText = currentScore; }
        function setPar(p, btn) { haptic(); currentPar = p; currentScore = p; document.getElementById('h-score-display').innerText = currentScore; document.querySelectorAll('.par-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        
        map.on('click', e => {
            haptic();
            targetPos = [e.latlng.lat, e.latlng.lng];
            document.getElementById('clear-target-btn').style.display = 'flex';
            if (!targetMarker) targetMarker = L.circleMarker(targetPos, {radius: 8, color: '#2ecc71', fillColor: 'black', fillOpacity: 0.7, weight: 3}).addTo(map);
            else targetMarker.setLatLng(targetPos);
            updateCalculations(true);
        });

        async function updateCalculations(force = false) {
            if (!userPos || !targetPos) return;
            if (targetLine) map.removeLayer(targetLine);
            targetLine = L.polyline([userPos, targetPos], {color: '#2ecc71', weight: 4, dashArray: '10, 10'}).addTo(map);
            const m = map.distance(userPos, targetPos);
            document.getElementById('dist-raw').innerText = convert(m);
            
            try {
                const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${userPos[0]},${userPos[1]}|${targetPos[0]},${targetPos[1]}`);
                const data = await res.json();
                const diff = data.results[1].elevation - data.results[0].elevation;
                document.getElementById('slope-val').innerText = (Math.atan(diff / m) * (180 / Math.PI)).toFixed(1) + "°";
                document.getElementById('dist-plays').innerText = convert(m + (diff * 1.1));
            } catch(e) { document.getElementById('dist-plays').innerText = convert(m); }
        }

        function saveAndNext() {
            haptic();
            const h = parseInt(document.getElementById('hole-num').innerText);
            roundData.scores.push({ h, par: currentPar, s: currentScore, diff: currentScore - currentPar });
            roundData.totalPar += currentPar; roundData.totalScore += currentScore;
            const d = roundData.totalScore - roundData.totalPar;
            document.getElementById('live-total').innerText = `TOT: ${d > 0 ? '+' + d : (d === 0 ? 'E' : d)}`;
            document.getElementById('hole-num').innerText = h + 1;
            currentScore = 4; setPar(4, document.querySelectorAll('.par-btn')[1]);
        }

        function toggleShotTrack() {
            haptic();
            const btn = document.getElementById('shot-btn');
            const counter = document.getElementById('live-shot-counter');
            if (!isTrackingShot) {
                if(!userPos) { initiateGPS(); return; }
                shotStartPos = [...userPos]; isTrackingShot = true;
                btn.innerText = "END SHOT"; btn.style.background = "var(--danger)"; btn.style.color = "white";
                counter.style.display = "block";
            } else {
                isTrackingShot = false;
                btn.innerText = "START SHOT"; btn.style.background = "var(--primary)"; btn.style.color = "black";
                counter.style.display = "none";
            }
        }

        function clearTarget() { targetPos = null; if (targetMarker) map.removeLayer(targetMarker); if (targetLine) map.removeLayer(targetLine); document.getElementById('clear-target-btn').style.display = 'none'; }
        function snapToUser() { haptic(); if (userPos) map.setView(userPos, 19); else initiateGPS(); }
    </script>
</body>
</html>
