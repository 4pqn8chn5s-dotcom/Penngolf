<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Penngolf Pro Caddy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc71; --bg: #0b0b0b; --card: #1a1a1a; --accent: #3498db; --danger: #e74c3c; --gold: #f1c40f;}
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin:0; font-family:-apple-system,sans-serif; background:var(--bg); color:white; overflow:hidden; }
        #map-container { position:relative; height:38vh; border-bottom:2px solid var(--primary); background:#222; }
        #map { height:100%; width:100%; }
        .map-overlay-right, .map-overlay-left { position:absolute; bottom:12px; z-index:1000; display:flex; flex-direction:column; gap:8px; }
        .map-overlay-right { right:12px; }
        .map-overlay-left { left:12px; }
        .map-sub-btn { background:rgba(255,255,255,0.95); border:none; border-radius:10px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.4); }

        .record-btn {
            background: #e74c3c; color: white; border: none; padding: 10px 14px; border-radius: 30px;
            font-weight: 900; font-size: 11px; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.6);
        }
        .record-btn::before { content: ''; display: inline-block; width: 10px; height: 10px; background: white; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .util-btn { background:#2a2a2a; padding:10px 12px; border-radius:12px; color:var(--primary); font-size: 11px; border: 1px solid #333; }
        #shot-btn, .main-btn { background:var(--primary); color:black; border:none; padding:14px; border-radius:14px; font-weight:900; text-transform:uppercase; }
        .card { background: var(--card); border-radius: 16px; padding: 18px; border: 1px solid #2a2a2a; margin-bottom: 12px; }
        .big-number { font-size: 42px; font-weight: 900; color: var(--primary); line-height: 1; letter-spacing: -2px; }
        .label { color: #777; font-size: 10px; text-transform: uppercase; font-weight: 800; margin-bottom: 6px; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .par-btn { flex: 1; padding: 15px 5px; border-radius: 10px; border: 1px solid #333; background: #222; color: white; font-weight: 800; font-size: 11px; }
        .par-btn.active { background: var(--accent); border-color: var(--accent); }
        .adjust-btn { width: 55px; height: 55px; border-radius: 18px; border: none; background: #333; color: white; font-size: 28px; }
        .pixel-logo { font-family:'Press Start 2P',cursive; font-size:9px; color:var(--primary); }
        .logo-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:8px; flex-wrap:wrap; }
        #tracer-modal, .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:3000; }
        #tracer-video-container { position:relative; width:100%; height:58vh; background:#111; }
        #tracer-video, #tracer-canvas { width:100%; height:100%; object-fit:cover; }
        #tracer-canvas { position:absolute; top:0; left:0; pointer-events:auto; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th { background:#111; padding:10px; font-size:10px; }
        td { padding:12px 8px; text-align:center; border-bottom:1px solid #333; font-size:16px; }
        tr { cursor:pointer; }
        tr:hover { background:rgba(46,204,113,0.15); }
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 3px solid var(--primary); padding: 20px; border-radius: 15px; z-index: 5000; font-family: 'Press Start 2P', cursive; text-align: center; color: var(--primary); display: none; font-size:14px; }
    </style>
</head>
<body>

    <div id="toast">PAR</div>
    
    <div id="map-container">
        <div id="map"></div>
        <div class="map-overlay-left">
            <div id="live-shot-counter">0 YDS</div>
            <button id="shot-btn" onclick="toggleShotTrack()">START SHOT</button>
            <div id="accuracy-info" style="font-size:9px;color:#888;"></div>
        </div>
        <div class="map-overlay-right">
            <button id="clear-target-btn" class="map-sub-btn" style="display:none;" onclick="clearTarget()">✕</button>
            <button class="map-sub-btn" onclick="resetNorth()">⟳</button>
            <button class="map-sub-btn" onclick="snapToUser()">📍</button>
        </div>
    </div>

    <div id="ui-container" style="height:62vh;padding:15px;overflow-y:auto;padding-bottom:140px;">
        <div class="logo-bar">
            <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
                <button id="unit-toggle" class="util-btn" onclick="cycleUnits()">YDS</button>
                <button class="record-btn" onclick="toggleTracer(true)">SHOT TRACER</button>
            </div>
            <div class="pixel-logo">PENNGOLF PRO</div>
            <div id="live-total" class="util-btn" style="color:var(--gold)">TOT: E</div>
        </div>

        <!-- Distance Card (kept) -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; text-align: center;">
                <div style="flex:1;"><div class="label">Actual</div><div id="dist-raw" class="big-number">--</div></div>
                <div style="flex:1;border-left:1px solid #333;border-right:1px solid #333;"><div class="label">Plays Like</div><div id="dist-plays" class="big-number">--</div></div>
                <div style="flex:1;"><div class="label">Slope</div><div id="slope-val" class="big-number" style="font-size:22px;">0°</div></div>
            </div>
        </div>

        <!-- Hole Scoring Card -->
        <div class="card">
            <div style="margin-bottom:12px;display:flex;justify-content:space-between;">
                <span class="label">Hole <span id="hole-num">1</span></span>
                <span id="edit-indicator" class="label" style="color:var(--accent);display:none;">● EDITING</span>
            </div>
            <div class="btn-row">
                <button class="par-btn" onclick="setPar(3,this)">PAR 3</button>
                <button class="par-btn active" onclick="setPar(4,this)">PAR 4</button>
                <button class="par-btn" onclick="setPar(5,this)">PAR 5</button>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
                <span class="label">Total Shots</span>
                <div style="display:flex;gap:25px;">
                    <button class="adjust-btn" onclick="adjustScore(-1)">−</button>
                    <div id="h-score-display" style="font-size:36px;font-weight:900;width:40px;text-align:center;">4</div>
                    <button class="adjust-btn" onclick="adjustScore(1)">+</button>
                </div>
            </div>
            <button id="finish-btn" class="main-btn" onclick="saveAndNext()">FINISH HOLE</button>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <button class="main-btn" style="background:#333;" onclick="toggleScorecard(true)">SCORECARD</button>
            <button class="main-btn" style="background:var(--accent);" onclick="downloadData()">EXPORT</button>
        </div>
    </div>

    <!-- SCORE CARD MODAL -->
    <div id="scorecard-modal" class="modal">
        <span style="float:right;font-size:40px;color:#555;cursor:pointer;" onclick="toggleScorecard(false)">×</span>
        <h2 style="color:var(--primary);font-family:'Press Start 2P';font-size:11px;margin-top:30px;">SCORECARD</h2>
        <div id="total-summary" style="font-size:22px;margin:20px 0;font-weight:900;color:var(--gold);"></div>
        <table>
            <thead><tr><th>Hole</th><th>Par</th><th>Score</th><th>+/-</th></tr></thead>
            <tbody id="card-body"></tbody>
        </table>
        <button class="main-btn" style="background:#333;margin-top:30px;" onclick="confirmEndRound()">RESET ROUND</button>
    </div>

    <!-- TRACER MODAL -->
    <div id="tracer-modal">
        <div style="padding:12px;display:flex;justify-content:space-between;background:#111;position:sticky;top:0;z-index:10;">
            <span style="color:var(--primary);font-family:'Press Start 2P';">SHOT TRACER</span>
            <span onclick="toggleTracer(false)" style="font-size:36px;cursor:pointer;color:#e74c3c;font-weight:bold;">×</span>
        </div>
        <div id="tracer-video-container">
            <video id="tracer-video" autoplay playsinline muted></video>
            <canvas id="tracer-canvas"></canvas>
        </div>
        <div style="padding:15px;display:flex;flex-direction:column;gap:10px;">
            <button id="tracer-record-btn" onclick="toggleLiveRecording()" style="background:var(--primary);padding:16px;">START LIVE RECORD + TRACE</button>
            <button onclick="clearTrace()" style="background:#333;">CLEAR TRACE</button>
            <button onclick="saveTracedVideo()" style="background:var(--gold);color:black;">EXPORT VIDEO</button>
            <div id="tracer-status" style="font-family:'Press Start 2P';font-size:9px;color:#aaa;text-align:center;">Hold steady • Live trace activates on record</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, maxZoom: 22, attributionControl: false, rotate: true }).setView([0,0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxNativeZoom: 19, maxZoom: 22 }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{y}/{x}', { opacity: 0.35, maxNativeZoom: 19, maxZoom: 22 }).addTo(map);

        let userPos = null, targetPos = null, userMarker = null, targetMarker = null, targetLine = null;
        let positionHistory = [];
        let currentPar = 4, currentScore = 4, currentUnit = 'YDS';
        let activeEditHole = null, isTrackingShot = false, shotStartPos = null;
        let roundData = JSON.parse(localStorage.getItem('penngolfRound')) || { scores: [], shotLogs: [] };

        function smoothPosition(newPos, accuracy) {
            positionHistory.push({lat:newPos[0],lng:newPos[1],acc:accuracy});
            if (positionHistory.length > 8) positionHistory.shift();
            let latSum=0, lngSum=0, weightSum=0;
            positionHistory.forEach((p,i) => {
                const w = (i+1) * (20 / (p.acc||15));
                latSum += p.lat * w; lngSum += p.lng * w; weightSum += w;
            });
            return [latSum/weightSum, lngSum/weightSum];
        }

        navigator.geolocation.watchPosition(pos => {
            const newPos = [pos.coords.latitude, pos.coords.longitude];
            const acc = pos.coords.accuracy || 999;
            document.getElementById('accuracy-info').innerText = `±${Math.round(acc)}m`;
            const smoothed = smoothPosition(newPos, acc);
            if (userPos && map.distance(userPos, smoothed) < 1.5) return;
            userPos = smoothed;
            if (!userMarker) {
                userMarker = L.circleMarker(userPos, {radius:9, color:'#fff', fillColor:'#3498db', weight:4}).addTo(map);
                map.setView(userPos, 19);
            } else userMarker.setLatLng(userPos);
            if (targetPos) updateCalculations();
            if (isTrackingShot && shotStartPos) {
                document.getElementById('live-shot-counter').innerText = `${convDist(map.distance(shotStartPos, userPos))} ${currentUnit}`;
            }
        }, null, {enableHighAccuracy:true, maximumAge:3000});

        map.on('click', e => {
            targetPos = [e.latlng.lat, e.latlng.lng];
            if (!targetMarker) targetMarker = L.circleMarker(targetPos, {radius:10, color:'#f1c40f', weight:4, fillColor:'transparent'}).addTo(map);
            else targetMarker.setLatLng(targetPos);
            if (targetLine) targetLine.setLatLngs([userPos, targetPos]);
            else targetLine = L.polyline([userPos, targetPos], {color:'#2ecc71', weight:4, dashArray:'8,12'}).addTo(map);
            document.getElementById('clear-target-btn').style.display = 'flex';
            updateCalculations();
        });

        async function updateCalculations() {
            if (!userPos || !targetPos) return;
            const dist = map.distance(userPos, targetPos);
            document.getElementById('dist-raw').innerText = convDist(dist);
            let playsLikeRaw = dist;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${userPos[0]},${targetPos[0]}&longitude=${userPos[1]},${targetPos[1]}`);
                const data = await res.json();
                if (data.elevation && data.elevation.length === 2) {
                    const diff = data.elevation[1] - data.elevation[0];
                    const slope = (Math.atan(diff / dist) * (180 / Math.PI)).toFixed(1);
                    document.getElementById('slope-val').innerText = (diff > 0 ? "+" : "") + slope + "°";
                    playsLikeRaw = dist + (diff * 2.8);
                }
            } catch(e) {}
            document.getElementById('dist-plays').innerText = convDist(playsLikeRaw);
        }

        function convDist(d) { return Math.round(currentUnit === 'YDS' ? d * 1.09361 : d); }

        function clearTarget() {
            targetPos = null;
            if(targetMarker){ map.removeLayer(targetMarker); targetMarker = null; }
            if(targetLine){ map.removeLayer(targetLine); targetLine = null; }
            document.getElementById('clear-target-btn').style.display = 'none';
            document.getElementById('dist-raw').innerText = "--";
            document.getElementById('dist-plays').innerText = "--";
            document.getElementById('slope-val').innerText = "0°";
        }

        function toggleShotTrack() {
            if (!userPos) return alert("Waiting for GPS...");
            isTrackingShot = !isTrackingShot;
            const btn = document.getElementById('shot-btn');
            if (isTrackingShot) {
                shotStartPos = [...userPos];
                btn.innerText = "END SHOT";
                btn.style.background = "#e74c3c";
                document.getElementById('live-shot-counter').style.display = "block";
            } else {
                const d = map.distance(shotStartPos, userPos);
                roundData.shotLogs.push(`H${document.getElementById('hole-num').innerText}: ${convDist(d)} ${currentUnit}`);
                btn.innerText = "START SHOT";
                btn.style.background = "";
                document.getElementById('live-shot-counter').style.display = "none";
                localStorage.setItem('penngolfRound', JSON.stringify(roundData));
            }
        }

        function saveAndNext() {
            if (isTrackingShot) toggleShotTrack();
            const h = activeEditHole || (roundData.scores.length + 1);
            const entry = { h, par: currentPar, s: currentScore, diff: currentScore - currentPar };
            if (activeEditHole) {
                const idx = roundData.scores.findIndex(s => s.h === activeEditHole);
                roundData.scores[idx] = entry;
                activeEditHole = null;
            } else {
                roundData.scores.push(entry);
            }
            localStorage.setItem('penngolfRound', JSON.stringify(roundData));
            showFeedback(entry.diff);
            clearTarget();
            updateUIForHole(roundData.scores.length + 1);
            updateGrandTotals();
        }

        function showFeedback(diff) {
            const t = document.getElementById('toast');
            let msg = "PAR", color = "var(--primary)";
            if (diff === -3) { msg = "ALBATROSS!!"; color = "var(--gold)"; }
            else if (diff === -2) { msg = "EAGLE!"; color = "var(--gold)"; }
            else if (diff === -1) { msg = "BIRDIE!"; color = "var(--gold)"; }
            else if (diff === 0) { msg = "PAR"; color = "var(--primary)"; }
            else if (diff === 1) { msg = "BOGEY"; color = "var(--danger)"; }
            else if (diff === 2) { msg = "DOUBLE BOGEY"; color = "var(--danger)"; }
            else if (diff > 2) { msg = "SNOWMAN..."; color = "#9b59b6"; }

            t.innerText = msg;
            t.style.color = color;
            t.style.borderColor = color;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2200);
        }

        function updateUIForHole(h) {
            document.getElementById('hole-num').innerText = h;
            const ex = roundData.scores.find(s => s.h === h);
            document.getElementById('edit-indicator').style.display = ex ? 'inline' : 'none';
            document.getElementById('finish-btn').innerText = ex ? "SAVE EDIT" : "FINISH HOLE";
            currentScore = ex ? ex.s : currentPar;
            currentPar = ex ? ex.par : 4;
            document.getElementById('h-score-display').innerText = currentScore;
            document.querySelectorAll('.par-btn').forEach(b => b.classList.toggle('active', parseInt(b.innerText.split(' ')[1]) === currentPar));
        }

        function setPar(p, btn) {
            currentPar = p; currentScore = p;
            document.getElementById('h-score-display').innerText = p;
            document.querySelectorAll('.par-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function adjustScore(v) {
            currentScore = Math.max(1, currentScore + v);
            document.getElementById('h-score-display').innerText = currentScore;
        }

        function updateGrandTotals() {
            const total = roundData.scores.reduce((a,b)=>a + b.diff, 0);
            document.getElementById('live-total').innerText = `TOT: ${total>0?'+'+total:(total===0?'E':total)}`;
        }

        function cycleUnits() {
            currentUnit = currentUnit === 'YDS' ? 'MTR' : 'YDS';
            document.getElementById('unit-toggle').innerText = currentUnit;
        }

        function resetNorth() { map.setBearing(0); }
        function snapToUser() { if (userPos) map.setView(userPos, 19); }
        function downloadData() {
            let txt = "PENNGOLF ROUND EXPORT\n\n" + roundData.scores.map(s => `Hole ${s.h}: Score ${s.s} (Par ${s.par})`).join("\n");
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([txt], {type:'text/plain'}));
            a.download = 'penngolf_round.txt';
            a.click();
        }

        function toggleScorecard(show) {
            const modal = document.getElementById('scorecard-modal');
            modal.style.display = show ? 'block' : 'none';
            if (show) {
                const tbody = document.getElementById('card-body');
                tbody.innerHTML = '';
                roundData.scores.sort((a,b)=>a.h-b.h).forEach(s => {
                    const row = document.createElement('tr');
                    row.innerHTML = `<td>${s.h}</td><td>${s.par}</td><td>${s.s}</td><td>${s.diff > 0 ? '+' + s.diff : (s.diff === 0 ? 'E' : s.diff)}</td>`;
                    row.onclick = () => editHole(s.h);
                    tbody.appendChild(row);
                });
                const total = roundData.scores.reduce((a,b)=>a+b.diff,0);
                document.getElementById('total-summary').innerText = `TOTAL: ${total>0?'+'+total:(total===0?'EVEN':total)}`;
            }
        }

        function editHole(h) {
            toggleScorecard(false);
            activeEditHole = h;
            updateUIForHole(h);
        }

        function confirmEndRound() {
            if (confirm("Reset entire round?")) {
                localStorage.removeItem('penngolfRound');
                location.reload();
            }
        }

        // Live Tracer
        let tracerStream = null, mediaRecorder = null, recordedChunks = [], tracePoints = [], isRecording = false, animationFrame = null;
        const tracerVideo = document.getElementById('tracer-video');
        const tracerCanvas = document.getElementById('tracer-canvas');
        const tCtx = tracerCanvas.getContext('2d', {willReadFrequently: true});

        async function startTracerCamera() {
            if (tracerStream) tracerStream.getTracks().forEach(t => t.stop());
            tracerStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment', width: {ideal:1280}, height: {ideal:720}}});
            tracerVideo.srcObject = tracerStream;
            await tracerVideo.play();
            tracerCanvas.width = tracerVideo.videoWidth || 1280;
            tracerCanvas.height = tracerVideo.videoHeight || 720;
        }

        window.toggleTracer = async (show) => {
            document.getElementById('tracer-modal').style.display = show ? 'block' : 'none';
            if (show) await startTracerCamera();
            else if (tracerStream) tracerStream.getTracks().forEach(t => t.stop());
        };

        window.toggleLiveRecording = () => {
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(tracerStream, {mimeType: 'video/mp4'});
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.start(100);
                isRecording = true;
                tracePoints = [];
                document.getElementById('tracer-record-btn').innerText = 'STOP RECORDING';
                document.getElementById('tracer-record-btn').style.background = '#e74c3c';
                startLiveTracing();
            } else {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('tracer-record-btn').innerText = 'START LIVE RECORD + TRACE';
                document.getElementById('tracer-record-btn').style.background = '';
                cancelAnimationFrame(animationFrame);
            }
        };

        function startLiveTracing() {
            function process() {
                tCtx.drawImage(tracerVideo, 0, 0, tracerCanvas.width, tracerCanvas.height);
                const data = tCtx.getImageData(0,0,tracerCanvas.width,tracerCanvas.height).data;
                let bestX = -1, bestY = -1, bestB = 0;
                for (let i = 0; i < data.length; i += 16) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    const br = (r + g + b) / 3;
                    if (br > 210 && Math.abs(r-g) < 40 && Math.abs(g-b) < 40 && br > bestB) {
                        bestB = br;
                        bestX = (i/4) % tracerCanvas.width;
                        bestY = Math.floor((i/4) / tracerCanvas.width);
                    }
                }
                if (bestX > 0) {
                    if (tracePoints.length === 0 || Math.hypot(bestX - tracePoints[tracePoints.length-1].x, bestY - tracePoints[tracePoints.length-1].y) > 8) {
                        tracePoints.push({x: bestX, y: bestY});
                    }
                }
                tCtx.strokeStyle = '#f1c40f';
                tCtx.lineWidth = 8;
                tCtx.shadowBlur = 30;
                tCtx.shadowColor = '#f1c40f';
                tCtx.beginPath();
                tracePoints.forEach((p,i) => i===0 ? tCtx.moveTo(p.x,p.y) : tCtx.lineTo(p.x,p.y));
                tCtx.stroke();
                animationFrame = requestAnimationFrame(process);
            }
            process();
        }

        window.clearTrace = () => { tracePoints = []; tCtx.clearRect(0,0,tracerCanvas.width,tracerCanvas.height); };
        window.saveTracedVideo = () => {
            if (recordedChunks.length) {
                const blob = new Blob(recordedChunks, {type:'video/mp4'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `shot-trace-${Date.now()}.mp4`;
                a.click();
            }
        };

        // Initialize
        updateUIForHole(roundData.scores.length + 1);
        updateGrandTotals();
    </script>
</body>
</html>
