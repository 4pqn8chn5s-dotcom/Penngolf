<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Penngolf Pro Caddy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc71; --bg: #0b0b0b; --card: #1a1a1a; --accent: #3498db; --danger: #e74c3c; --gold: #f1c40f;}
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin:0; font-family:-apple-system,sans-serif; background:var(--bg); color:white; overflow:hidden; }
        #map-container { position:relative; height:38vh; border-bottom:2px solid var(--primary); background:#222; }
        #map { height:100%; width:100%; }
        .map-overlay-right, .map-overlay-left { position:absolute; bottom:12px; z-index:1000; display:flex; flex-direction:column; gap:8px; }
        .map-overlay-right { right:12px; }
        .map-overlay-left { left:12px; }
        .map-sub-btn { background:rgba(255,255,255,0.95); border:none; border-radius:10px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.4); }

        /* Improved Record Button */
        .record-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 11px 16px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.6);
            white-space: nowrap;
            min-width: 130px;
            justify-content: center;
        }
        .record-btn::before {
            content: '';
            display: inline-block;
            width: 11px;
            height: 11px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .util-btn { background:#2a2a2a; padding:10px 12px; border-radius:12px; color:var(--primary); font-size: 11px; border: 1px solid #333; }
        #shot-btn, .main-btn { background:var(--primary); color:black; border:none; padding:12px 16px; border-radius:14px; font-weight:900; text-transform:uppercase; }
        .card { background: var(--card); border-radius: 16px; padding: 18px; border: 1px solid #2a2a2a; margin-bottom: 12px; }
        .big-number { font-size: 42px; font-weight: 900; color: var(--primary); line-height: 1; letter-spacing: -2px; }
        .label { color: #777; font-size: 10px; text-transform: uppercase; font-weight: 800; margin-bottom: 6px; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .par-btn { flex: 1; padding: 15px 5px; border-radius: 10px; border: 1px solid #333; background: #222; color: white; font-weight: 800; font-size: 11px; }
        .par-btn.active { background: var(--accent); border-color: var(--accent); }
        .adjust-btn { width: 55px; height: 55px; border-radius: 18px; border: none; background: #333; color: white; font-size: 28px; }
        .pixel-logo { font-family:'Press Start 2P',cursive; font-size:9px; color:var(--primary); }
        #tracer-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:3000; overflow:auto; }
        #tracer-video-container { position:relative; width:100%; height:60vh; background:#111; }
        #tracer-video, #tracer-canvas { width:100%; height:100%; object-fit:cover; }
        #tracer-canvas { position:absolute; top:0; left:0; pointer-events:auto; }
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 3px solid var(--primary); padding: 20px; border-radius: 15px; z-index: 5000; font-family: 'Press Start 2P', cursive; text-align: center; color: var(--primary); display: none; }
        .logo-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
    </style>
</head>
<body>

    <div id="toast">PAR</div>
    
    <div id="map-container">
        <div id="map"></div>
        <div class="map-overlay-left">
            <div id="live-shot-counter">0 YDS</div>
            <button id="shot-btn" onclick="toggleShotTrack()">START SHOT</button>
            <div id="accuracy-info" style="font-size:9px;color:#888;"></div>
        </div>
        <div class="map-overlay-right">
            <button id="clear-target-btn" class="map-sub-btn" style="display:none;" onclick="clearTarget()">✕</button>
            <button class="map-sub-btn" onclick="resetNorth()">⟳</button>
            <button class="map-sub-btn" onclick="snapToUser()">📍</button>
        </div>
    </div>

    <div id="ui-container" style="height:62vh;padding:15px;overflow-y:auto;padding-bottom:140px;">
        <div class="logo-bar">
            <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
                <button class="util-btn" onclick="cycleUnits()">YDS</button>
                <button class="util-btn" onclick="toggleBag(true)">🎒</button>
                <button class="record-btn" onclick="toggleTracer(true)">SHOT TRACER</button>
            </div>
            <div class="pixel-logo">PENNGOLF PRO</div>
            <div id="live-total" class="util-btn" style="color:var(--gold)">TOT: E</div>
        </div>

        <!-- Rest of your UI cards -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; text-align: center;">
                <div style="flex:1;"><div class="label">Actual</div><div id="dist-raw" class="big-number">--</div></div>
                <div style="flex:1;border-left:1px solid #333;border-right:1px solid #333;"><div class="label">Plays Like</div><div id="dist-plays" class="big-number">--</div></div>
                <div style="flex:1;"><div class="label">Slope</div><div id="slope-val" class="big-number" style="font-size:22px;">0°</div></div>
            </div>
            <div id="caddy-box" style="background:rgba(46,204,113,0.08);border:1px dashed var(--primary);border-radius:12px;padding:12px;margin-top:12px;display:flex;align-items:center;gap:12px;">
                <span style="font-size:24px;">🏌️</span>
                <div>
                    <div class="label" style="margin:0;color:var(--primary)">Caddy Suggestion</div>
                    <div id="club-recommendation" class="club-suggest">TAP MAP FOR TARGET</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="margin-bottom:12px;display:flex;justify-content:space-between;">
                <span class="label">Hole <span id="hole-num">1</span></span>
                <span id="edit-indicator" class="label" style="color:var(--accent);display:none;">● EDITING</span>
            </div>
            <div class="btn-row">
                <button class="par-btn" onclick="setPar(3,this)">PAR 3</button>
                <button class="par-btn active" onclick="setPar(4,this)">PAR 4</button>
                <button class="par-btn" onclick="setPar(5,this)">PAR 5</button>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
                <span class="label">Total Shots</span>
                <div style="display:flex;gap:25px;">
                    <button class="adjust-btn" onclick="adjustScore(-1)">−</button>
                    <div id="h-score-display" style="font-size:36px;font-weight:900;width:40px;text-align:center;">4</div>
                    <button class="adjust-btn" onclick="adjustScore(1)">+</button>
                </div>
            </div>
            <button id="finish-btn" class="main-btn" onclick="saveAndNext()">FINISH HOLE</button>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <button class="main-btn" style="background:#333;" onclick="toggleScorecard(true)">SCORECARD</button>
            <button class="main-btn" style="background:var(--accent);" onclick="downloadData()">EXPORT</button>
        </div>
    </div>

    <!-- TRACER MODAL -->
    <div id="tracer-modal">
        <div style="padding:12px;display:flex;justify-content:space-between;background:#111;">
            <span style="color:var(--primary);font-family:'Press Start 2P';">SHOT TRACER</span>
            <span onclick="toggleTracer(false)" style="font-size:32px;cursor:pointer;color:#888;">×</span>
        </div>
        <div id="tracer-video-container">
            <video id="tracer-video" autoplay playsinline muted></video>
            <canvas id="tracer-canvas"></canvas>
        </div>
        <div style="padding:15px;display:flex;flex-direction:column;gap:10px;">
            <button id="tracer-record-btn" onclick="toggleLiveRecording()" style="background:var(--primary);padding:16px;">START LIVE RECORD + TRACE</button>
            <button onclick="clearTrace()" style="background:#333;">CLEAR TRACE</button>
            <button onclick="saveTracedVideo()" style="background:var(--gold);color:black;">EXPORT VIDEO</button>
            <div id="tracer-status" style="font-family:'Press Start 2P';font-size:9px;color:#aaa;text-align:center;">Hold phone steady • Live trace activates</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // [Full script from previous complete version - same as last message]
        const map = L.map('map', { zoomControl: false, maxZoom: 22, attributionControl: false, rotate: true }).setView([0,0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxNativeZoom: 19, maxZoom: 22 }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{y}/{x}', { opacity: 0.35, maxNativeZoom: 19, maxZoom: 22 }).addTo(map);

        let userPos = null, targetPos = null, userMarker = null, targetMarker = null, targetLine = null;
        let positionHistory = [];
        let currentPar = 4, currentScore = 4, currentUnit = 'YDS';
        let roundData = JSON.parse(localStorage.getItem('penngolfRound')) || { scores: [], shotLogs: [] };
        let myBag = JSON.parse(localStorage.getItem('penngolfBag')) || { "Driver": 250, "3 Wood": 225, "7 Iron": 150 };

        // ... (All the functions from the previous complete version: smoothPosition, geolocation, updateCalculations, toggleTracer, etc.)

        // Initialize
        updateUIForHole(roundData.scores.length + 1);
        updateGrandTotals();
    </script>
</body>
</html>
