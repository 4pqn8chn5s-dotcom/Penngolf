<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Penngolf Pro Caddy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Adding a Pixel-style font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc71; --bg: #121212; --card: #1e1e1e; --accent: #3498db; --danger: #e74c3c; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: white; overflow: hidden; touch-action: manipulation; }
        
        #map { height: 38vh; width: 100%; background: #222; border-bottom: 2px solid var(--primary); }
        #ui-container { height: 62vh; padding: 12px; box-sizing: border-box; overflow-y: auto; padding-bottom: 100px; }

        /* 8-BIT LOGO SECTION */
        .logo-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            padding: 0 5px;
        }

        .pixel-logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: var(--primary);
            text-shadow: 2px 2px 0px #000;
            letter-spacing: 1px;
            animation: float 3s ease-in-out infinite;
            text-align: center;
        }

        /* Nintendo-style "Floating Item" Animation */
        @keyframes float {
            0% { transform: translateY(0px); text-shadow: 2px 2px 0px #000; }
            50% { transform: translateY(-5px); text-shadow: 2px 7px 2px rgba(0,0,0,0.5); color: #fff; }
            100% { transform: translateY(0px); text-shadow: 2px 2px 0px #000; }
        }

        #gps-error { position: fixed; top: 0; width: 100%; background: var(--danger); color: white; text-align: center; padding: 10px; z-index: 3000; display: none; font-weight: bold; }
        
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; margin-bottom: 10px; }
        .big-number { font-size: 42px; font-weight: 900; color: var(--primary); line-height: 1; }
        .label { color: #888; font-size: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }

        .score-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .adjust-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #333; color: white; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 8px; }
        .par-btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; font-weight: bold; position: relative; }
        .par-btn.active { background: var(--accent); border-color: var(--accent); }
        .par-btn::before { content: "PAR"; position: absolute; top: 2px; left: 50%; transform: translateX(-50%); font-size: 7px; opacity: 0.5; }

        #shot-overlay { position: absolute; top: 15px; right: 60px; z-index: 1000; display: flex; align-items: center; gap: 10px; }
        #live-shot-counter { background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 15px; border: 1px solid var(--primary); font-weight: 900; color: var(--primary); display: none; }
        #shot-btn { background: var(--primary); color: black; border: none; padding: 10px 18px; border-radius: 25px; font-weight: 900; }
        #shot-btn.tracking { background: var(--danger); color: white; }
        
        #map-actions { position: absolute; top: 60px; right: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .map-sub-btn { background: white; border: none; border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        #scorecard-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.98); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: white; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; }
        .main-btn { background: var(--primary); color: black; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: 800; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="gps-error">GPS Disabled. Please enable location.</div>

    <div id="shot-overlay">
        <div id="live-shot-counter">0 YDS</div>
        <button id="shot-btn" onclick="toggleShotTrack()">START SHOT</button>
    </div>

    <div id="map-actions">
        <button class="map-sub-btn" onclick="snapToUser()">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06z"/></svg>
        </button>
        <button id="clear-target-btn" class="map-sub-btn" style="display:none; color:var(--danger);" onclick="clearTarget()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
    </div>

    <div id="map"></div>

    <div id="ui-container">
        <!-- THE NEW LOGO BAR -->
        <div class="logo-bar">
            <div id="unit-toggle" class="label" style="background:#333; padding:5px 10px; border-radius:15px; color:var(--primary); min-width: 60px; text-align: center;" onclick="cycleUnits()">YDS</div>
            
            <div class="pixel-logo">MPENN GOLF</div>
            
            <div id="live-total" style="background:#333; padding:5px 12px; border-radius:15px; font-weight:800; font-size:12px; min-width: 60px; text-align: center;">TOT: E</div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; text-align: center;">
                <div style="flex: 1;"><div class="label">Actual</div><div id="dist-raw" class="big-number">--</div></div>
                <div style="flex: 1; border-left: 1px solid #333; border-right: 1px solid #333;"><div class="label">Plays Like</div><div id="dist-plays" class="big-number">--</div></div>
                <div style="flex: 1;"><div class="label">Slope</div><div id="slope-val" class="big-number" style="font-size: 22px; padding-top:14px;">0°</div></div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span class="label" style="font-size:14px;">Hole <span id="hole-num" style="color:white;">1</span></span>
                <span class="label" style="color:var(--accent);">Select Par</span>
            </div>
            <div class="btn-group" style="margin-bottom: 20px;">
                <button class="par-btn" onclick="setPar(3, this)">3</button>
                <button class="par-btn active" onclick="setPar(4, this)">4</button>
                <button class="par-btn" onclick="setPar(5, this)">5</button>
            </div>
            <div class="score-row">
                <span class="label">Hole Score</span>
                <div style="display:flex; align-items:center; gap:20px;">
                    <button class="adjust-btn" onclick="adjustScore(-1)">−</button>
                    <div id="h-score-display" style="font-size:32px; font-weight:900;">4</div>
                    <button class="adjust-btn" onclick="adjustScore(1)">+</button>
                </div>
            </div>
            <button class="main-btn" onclick="saveAndNext()">FINISH HOLE</button>
        </div>

        <button class="main-btn" style="background:#444; color:white;" onclick="toggleScorecard(true)">VIEW SCORECARD</button>
        <button class="main-btn" style="background:#3498db; color:white;" onclick="downloadData()">DOWNLOAD ROUND</button>
    </div>

    <div id="scorecard-modal">
        <span style="float:right; font-size:40px;" onclick="toggleScorecard(false)">&times;</span>
        <h2 style="color:var(--primary); font-family: 'Press Start 2P', cursive; font-size: 14px;">Scorecard</h2>
        <div id="total-summary" style="font-size:18px; margin-bottom:20px;"></div>
        <table><thead><tr><th>Hole</th><th>Par</th><th>Score</th><th>+/-</th></tr></thead><tbody id="card-body"></tbody></table>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ... (All JS from previous builds remains identical and active) ...
        const map = L.map('map', { zoomControl: false, maxZoom: 22 }).setView([0,0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 22, maxNativeZoom: 18 }).addTo(map);

        let userPos, targetPos, userMarker, targetMarker, targetLine, shotStartPos;
        let isTrackingShot = false, currentPar = 4, currentScore = 4, currentUnit = 'YDS';
        let roundData = { scores: [], totalPar: 0, totalScore: 0, shotLogs: [] };
        let lastLoggedPos = null;

        function haptic() { if(window.navigator.vibrate) window.navigator.vibrate(15); }

        function cycleUnits() {
            haptic();
            currentUnit = (currentUnit === 'YDS') ? 'MTR' : 'YDS';
            document.getElementById('unit-toggle').innerText = currentUnit;
            updateCalculations(true);
        }

        function convert(m) { return currentUnit === 'YDS' ? Math.round(m * 1.09361) : Math.round(m); }
        function adjustScore(v) { haptic(); currentScore = Math.max(1, currentScore + v); document.getElementById('h-score-display').innerText = currentScore; }
        function setPar(p, btn) { haptic(); currentPar = p; currentScore = p; document.getElementById('h-score-display').innerText = currentScore; document.querySelectorAll('.par-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        function clearTarget() { haptic(); targetPos = null; if (targetMarker) map.removeLayer(targetMarker); if (targetLine) map.removeLayer(targetLine); document.getElementById('clear-target-btn').style.display = 'none'; document.getElementById('dist-raw').innerText = '--'; document.getElementById('dist-plays').innerText = '--'; document.getElementById('slope-val').innerText = '0°'; }

        navigator.geolocation.watchPosition(pos => {
            document.getElementById('gps-error').style.display = 'none';
            userPos = [pos.coords.latitude, pos.coords.longitude];
            if (!userMarker) { userMarker = L.circleMarker(userPos, {radius: 9, color: 'white', fillColor: '#3498db', fillOpacity: 1, weight: 3}).addTo(map); map.setView(userPos, 19); } 
            else userMarker.setLatLng(userPos);
            if (isTrackingShot && shotStartPos) { const liveDist = convert(map.distance(shotStartPos, userPos)); document.getElementById('live-shot-counter').innerText = `${liveDist} ${currentUnit}`; }
            if (!lastLoggedPos || map.distance(lastLoggedPos, userPos) > 3) { updateCalculations(); lastLoggedPos = [...userPos]; }
        }, err => { document.getElementById('gps-error').style.display = 'block'; }, { enableHighAccuracy: true });

        map.on('click', e => { haptic(); targetPos = [e.latlng.lat, e.latlng.lng]; document.getElementById('clear-target-btn').style.display = 'flex'; if (!targetMarker) targetMarker = L.circleMarker(targetPos, {radius: 7, color: '#2ecc71', fillColor: 'black', fillOpacity: 0.7, weight: 3}).addTo(map); else targetMarker.setLatLng(targetPos); updateCalculations(true); });

        async function updateCalculations(force = false) {
            if (!userPos || !targetPos) return;
            if (targetLine) map.removeLayer(targetLine);
            targetLine = L.polyline([userPos, targetPos], {color: '#2ecc71', weight: 3, dashArray: '8, 12'}).addTo(map);
            const m = map.distance(userPos, targetPos);
            document.getElementById('dist-raw').innerText = convert(m);
            if (force || !document.getElementById('dist-plays').innerText.includes('--')) {
                try {
                    const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${userPos[0]},${userPos[1]}|${targetPos[0]},${targetPos[1]}`);
                    const data = await res.json();
                    const diff = data.results[1].elevation - data.results[0].elevation;
                    document.getElementById('slope-val').innerText = (Math.atan(diff / m) * (180 / Math.PI)).toFixed(1) + "°";
                    document.getElementById('dist-plays').innerText = convert(m + (diff * 1.1));
                } catch(e) { document.getElementById('dist-plays').innerText = convert(m); }
            }
        }

        function saveAndNext() {
            haptic();
            const h = parseInt(document.getElementById('hole-num').innerText);
            roundData.scores.push({ h, par: currentPar, s: currentScore, diff: currentScore - currentPar });
            roundData.totalPar += currentPar; roundData.totalScore += currentScore;
            const d = roundData.totalScore - roundData.totalPar;
            const el = document.getElementById('live-total');
            el.innerText = `TOT: ${d > 0 ? '+' + d : (d === 0 ? 'E' : d)}`;
            el.style.color = d > 0 ? 'var(--danger)' : (d === 0 ? '#f1c40f' : 'var(--primary)');
            document.getElementById('hole-num').innerText = h + 1;
            currentScore = 4; setPar(4, document.querySelectorAll('.par-btn')[1]);
        }

        function toggleScorecard(show) { haptic(); const m = document.getElementById('scorecard-modal'); if (show) { const b = document.getElementById('card-body'); b.innerHTML = ""; roundData.scores.forEach(s => b.innerHTML += `<tr><td>${s.h}</td><td>${s.par}</td><td>${s.s}</td><td>${s.diff > 0 ? '+'+s.diff : (s.diff===0?'E':s.diff)}</td></tr>`); const totalDiff = roundData.totalScore - roundData.totalPar; document.getElementById('total-summary').innerText = `Total: ${roundData.totalScore} (${totalDiff > 0 ? '+'+totalDiff : (totalDiff === 0 ? 'E' : totalDiff)})`; m.style.display = "block"; } else m.style.display = "none"; }
        function toggleShotTrack() { haptic(); const btn = document.getElementById('shot-btn'); const counter = document.getElementById('live-shot-counter'); if (!isTrackingShot) { shotStartPos = [...userPos]; isTrackingShot = true; btn.innerText = "END SHOT"; btn.classList.add('tracking'); counter.style.display = "block"; counter.innerText = `0 ${currentUnit}`; } else { const d = convert(map.distance(shotStartPos, userPos)); roundData.shotLogs.push(`Hole ${document.getElementById('hole-num').innerText}: ${d} ${currentUnit}`); isTrackingShot = false; btn.innerText = "START SHOT"; btn.classList.remove('tracking'); counter.style.display = "none"; } }
        function downloadData() { let t = "PENNGOLF ROUND SUMMARY\nSCORES:\n" + roundData.scores.map(s => `Hole ${s.h}: ${s.s} (Par ${s.par})`).join("\n"); t += "\n\nSHOT TRACKS:\n" + roundData.shotLogs.join("\n"); const blob = new Blob([t], {type: 'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'round.txt'; a.click(); }
        function snapToUser() { haptic(); if (userPos) map.setView(userPos, 19); }
    </script>
</body>
</html>
