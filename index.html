<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Elite Golf GPS</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #2ecc71; --bg: #121212; --card: #1e1e1e; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Ensure map has a visible height */
        #map { height: 50vh; width: 100%; background: #222; }
        
        #ui-container { height: 50vh; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        .big-number { font-size: 32px; font-weight: 800; color: var(--primary); }
        .label { color: #888; font-size: 10px; text-transform: uppercase; }
        
        button { background: var(--primary); color: black; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 5px; cursor: pointer; }
        
        /* Debug Console */
        #debug { font-size: 10px; color: #ff5555; padding: 5px; background: #000; height: 40px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="debug">System: Initializing...</div>

    <div id="ui-container">
        <div class="card">
            <div class="row">
                <div style="text-align:center; flex:1;">
                    <div class="label">Actual</div>
                    <div id="dist-raw" class="big-number">--</div>
                </div>
                <div style="text-align:center; flex:1; border-left: 1px solid #333;">
                    <div class="label">Plays Like</div>
                    <div id="plays-like" class="big-number">--</div>
                </div>
            </div>
            <button onclick="getLocation()">Force GPS Refresh</button>
        </div>

        <div class="card">
            <div class="row">
                <span>Hole <b id="hole-num">1</b></span>
                <button style="width: auto; padding: 10px 20px;" onclick="nextHole()">Next Hole</button>
            </div>
        </div>
    </div>

    <!-- Load Leaflet Script -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const debug = document.getElementById('debug');
        function log(msg) { debug.innerText = "Log: " + msg; }

        let map, userMarker;

        // 1. Initialize Map with a fallback
        try {
            map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: 'OSM'
            }).addTo(map);
            log("Map loaded. Waiting for GPS...");
        } catch (e) {
            log("Map Error: " + e.message);
        }

        // 2. Critical: Request Location Correctly
        function getLocation() {
            if (navigator.geolocation) {
                log("Requesting GPS Permission...");
                navigator.geolocation.watchPosition(
                    (pos) => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        log(`GPS Fixed: ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
                        
                        const latlng = [lat, lng];
                        if (!userMarker) {
                            userMarker = L.circleMarker(latlng, {radius: 8, color: '#fff', fillColor: '#2ecc71', fillOpacity: 1}).addTo(map);
                            map.setView(latlng, 18);
                        } else {
                            userMarker.setLatLng(latlng);
                        }
                    },
                    (err) => {
                        log("GPS Denied/Error: " + err.message);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                log("Geolocation not supported on this browser.");
            }
        }

        function nextHole() {
            const h = document.getElementById('hole-num');
            h.innerText = parseInt(h.innerText) + 1;
        }

        // Run on load
        window.onload = getLocation;
    </script>
</body>
</html>
