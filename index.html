<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Penngolf Pro Caddy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc71; --bg: #0b0b0b; --card: #1a1a1a; --accent: #3498db; --danger: #e74c3c; --gold: #f1c40f;}
        * { box-sizing: border-box; }
        body { margin:0; font-family:-apple-system,sans-serif; background:var(--bg); color:white; overflow:hidden; }
        #map-container { position:relative; height:38vh; border-bottom:2px solid var(--primary); }
        #map { height:100%; width:100%; }
        .map-overlay-right, .map-overlay-left { position:absolute; bottom:12px; z-index:1000; display:flex; flex-direction:column; gap:8px; }
        .map-overlay-right { right:12px; }
        .map-overlay-left { left:12px; }
        .map-sub-btn { background:rgba(255,255,255,0.95); border:none; border-radius:10px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.4); }
        button { font-weight:900; border-radius:12px; }
        #shot-btn, .main-btn { background:var(--primary); color:black; }
        #tracer-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:3000; }
        #tracer-video-container { position:relative; width:100%; height:60vh; background:#111; }
        #tracer-video, #tracer-canvas { width:100%; height:100%; object-fit:cover; }
        #tracer-canvas { position:absolute; top:0; left:0; pointer-events:auto; }
        .pixel-logo { font-family:'Press Start 2P',cursive; font-size:9px; color:var(--primary); }
        /* Keep your original styles for cards, etc. */
    </style>
</head>
<body>

    <!-- Your original map + UI (unchanged) -->
    <div id="map-container">
        <div id="map"></div>
        <div class="map-overlay-left">
            <div id="live-shot-counter">0 YDS</div>
            <button id="shot-btn" onclick="toggleShotTrack()">START SHOT</button>
        </div>
        <div class="map-overlay-right">
            <button class="map-sub-btn" onclick="resetNorth()">⟳</button>
            <button class="map-sub-btn" onclick="snapToUser()">📍</button>
        </div>
    </div>

    <div id="ui-container">
        <div class="logo-bar">
            <div style="display:flex;gap:6px;">
                <button class="util-btn" onclick="cycleUnits()">YDS</button>
                <button class="util-btn" onclick="toggleBag(true)">🎒</button>
                <button class="util-btn" onclick="toggleTracer(true)">🎥 LIVE TRACER</button>
            </div>
            <div class="pixel-logo">PENNGOLF PRO</div>
            <div id="live-total" class="util-btn" style="color:var(--gold)">TOT: E</div>
        </div>

        <!-- Your existing distance card, scoring card, etc. (copy from previous version) -->

    </div>

    <!-- TRACER MODAL -->
    <div id="tracer-modal">
        <div style="padding:12px; display:flex; justify-content:space-between; background:#111;">
            <span style="color:var(--primary); font-family:'Press Start 2P';">LIVE TRACER</span>
            <span onclick="toggleTracer(false)" style="font-size:32px;cursor:pointer;">×</span>
        </div>

        <div id="tracer-video-container">
            <video id="tracer-video" autoplay playsinline muted></video>
            <canvas id="tracer-canvas"></canvas>
        </div>

        <div style="padding:15px; display:flex; flex-direction:column; gap:10px;">
            <button id="tracer-record-btn" onclick="toggleLiveRecording()" style="background:var(--primary);padding:16px;">START LIVE RECORD + TRACE</button>
            <button onclick="clearTrace()" style="background:#333;">CLEAR TRACE</button>
            <button onclick="saveTracedVideo()" style="background:var(--gold);color:black;">EXPORT VIDEO</button>
            <div id="tracer-status" style="font-family:'Press Start 2P';font-size:9px;color:#aaa;text-align:center;">
                Hold steady • White ball against sky works best
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ==================== ORIGINAL CADDY CODE (GPS + Scoring) ====================
        // (Your full GPS smoothing, map setup, calculations, scoring, etc. from previous version)
        // ... paste your existing map + GPS code here ...

        // ==================== LIVE TRACER CODE ====================
        let tracerStream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let tracePoints = [];
        let isRecording = false;
        let animationFrame = null;

        const tracerVideo = document.getElementById('tracer-video');
        const tracerCanvas = document.getElementById('tracer-canvas');
        const tCtx = tracerCanvas.getContext('2d', { willReadFrequently: true });

        async function startTracerCamera() {
            if (tracerStream) tracerStream.getTracks().forEach(t => t.stop());
            tracerStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: {ideal:1280}, height: {ideal:720} }
            });
            tracerVideo.srcObject = tracerStream;
            await tracerVideo.play();
            tracerCanvas.width = tracerVideo.videoWidth || 1280;
            tracerCanvas.height = tracerVideo.videoHeight || 720;
        }

        window.toggleTracer = async (show) => {
            const modal = document.getElementById('tracer-modal');
            modal.style.display = show ? 'block' : 'none';
            if (show) await startTracerCamera();
            else stopEverything();
        };

        function stopEverything() {
            if (tracerStream) tracerStream.getTracks().forEach(t => t.stop());
            if (animationFrame) cancelAnimationFrame(animationFrame);
        }

        window.toggleLiveRecording = () => {
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(tracerStream, { mimeType: 'video/mp4' });
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    const url = URL.createObjectURL(blob);
                    tracerVideo.srcObject = null;
                    tracerVideo.src = url;
                };
                mediaRecorder.start(100); // small chunks for better live feel
                isRecording = true;
                tracePoints = [];
                document.getElementById('tracer-record-btn').innerText = 'STOP RECORDING';
                document.getElementById('tracer-record-btn').style.background = '#e74c3c';
                startLiveTracing();
            } else {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('tracer-record-btn').innerText = 'START LIVE RECORD + TRACE';
                document.getElementById('tracer-record-btn').style.background = '';
                cancelAnimationFrame(animationFrame);
            }
        };

        function startLiveTracing() {
            function processLiveFrame() {
                tCtx.drawImage(tracerVideo, 0, 0, tracerCanvas.width, tracerCanvas.height);

                // Live ball detection (bright white/yellow)
                const imageData = tCtx.getImageData(0, 0, tracerCanvas.width, tracerCanvas.height);
                const data = imageData.data;

                let bestX = -1, bestY = -1, bestBrightness = 0;

                for (let i = 0; i < data.length; i += 16) { // sample every 4 pixels for speed
                    const r = data[i], g = data[i+1], b = data[i+2];
                    const brightness = (r + g + b) / 3;
                    if (brightness > 200 && Math.abs(r - g) < 40 && Math.abs(g - b) < 40) {
                        if (brightness > bestBrightness) {
                            bestBrightness = brightness;
                            bestX = (i/4) % tracerCanvas.width;
                            bestY = Math.floor((i/4) / tracerCanvas.width);
                        }
                    }
                }

                if (bestX > 0 && bestY > 0) {
                    tracePoints.push({x: bestX, y: bestY});
                }

                // Draw smooth glowing trail
                tCtx.strokeStyle = '#f1c40f';
                tCtx.lineWidth = 8;
                tCtx.shadowBlur = 30;
                tCtx.shadowColor = '#f1c40f';
                tCtx.beginPath();
                tracePoints.forEach((p,i) => i === 0 ? tCtx.moveTo(p.x, p.y) : tCtx.lineTo(p.x, p.y));
                tCtx.stroke();

                // Manual tap support
                tracerCanvas.onclick = (e) => {
                    const rect = tracerCanvas.getBoundingClientRect();
                    const x = (e.clientX - rect.left) * (tracerCanvas.width / rect.width);
                    const y = (e.clientY - rect.top) * (tracerCanvas.height / rect.height);
                    tracePoints.push({x, y});
                };

                animationFrame = requestAnimationFrame(processLiveFrame);
            }

            processLiveFrame();
        }

        window.clearTrace = () => { tracePoints = []; tCtx.clearRect(0,0,tracerCanvas.width,tracerCanvas.height); };

        window.saveTracedVideo = () => {
            if (recordedChunks.length > 0) {
                const blob = new Blob(recordedChunks, {type:'video/mp4'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `live-golf-trace-${Date.now()}.mp4`;
                a.click();
            }
        };

        // Initialize your original app
        // ... call your existing updateUIForHole() etc.
    </script>
</body>
</html>
